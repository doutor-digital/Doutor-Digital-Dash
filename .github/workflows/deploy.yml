name: deploy-api

# O projeto vive em Back-End/, mas o Actions só lê workflows da raiz do repo.
# Por isso o arquivo fica aqui e o build aponta o context para ./Back-End.
on:
  push:
    branches: [main]
    # GitHub não aceita paths + paths-ignore no mesmo evento; negação com "!"
    # faz o mesmo (padrões negativos depois do positivo excluem).
    paths:
      - "Back-End/**"
      - "!Back-End/**/*.md"
      - "!Back-End/docs/**"
      - "!Back-End/reference/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  IMAGE_NAME: doutordigital-api
  STACK_NAME: ddapi
  REMOTE_DIR: /opt/doutordigital/api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Owner em minúsculas
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./Back-End
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # source com o prefixo Back-End/; strip_components remove esse nível para
      # o arquivo cair como docker-compose.yml direto em REMOTE_DIR.
      - name: Copia o docker-compose.yml para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: Back-End/docker-compose.yml
          target: ${{ env.REMOTE_DIR }}
          strip_components: 1

      - name: Rolling update sem downtime
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script_stop: true
          # Script ASCII puro de proposito: acentos/emoji se corrompem no
          # transporte do ssh-action e quebram o parser do bash remoto.
          script: |
            set -eu
            cd ${{ env.REMOTE_DIR }}

            # Credencial de leitura do GHCR (PAT read:packages de vida longa: o
            # --with-registry-auth grava a credencial no swarm p/ pulls futuros).
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # O IMAGE_TAG vem do CI (o SHA). Guarda antes de carregar o .env,
            # senao o IMAGE_TAG=latest do arquivo sobrescreve o SHA.
            CI_TAG="$IMAGE_TAG"
            set -a
            . ./.env
            set +a
            IMAGE_TAG="$CI_TAG"
            export IMAGE_TAG

            echo "deploying $IMAGE_TAG"
            docker stack deploy -c docker-compose.yml --with-registry-auth --prune ${{ env.STACK_NAME }}

            SVC=${{ env.STACK_NAME }}_api
            n=0
            while [ "$n" -lt 60 ]; do
              STATE=$(docker service inspect "$SVC" --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{else}}completed{{end}}')
              echo "state: $STATE"
              if [ "$STATE" = "completed" ]; then
                echo "rollout OK"
                exit 0
              fi
              case "$STATE" in
                rollback_*|paused)
                  echo "rollout FAILED ($STATE) - swarm reverteu"
                  docker service ps "$SVC" --no-trunc | head -20
                  exit 1
                  ;;
              esac
              n=$((n + 1))
              sleep 5
            done
            echo "timeout esperando convergencia"
            docker service ps "$SVC" --no-trunc | head -20
            exit 1

      - name: Smoke test público
        run: |
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ vars.API_DOMAIN }}/health" --max-time 10 || echo 000)
            [ "$CODE" = "200" ] && { echo "✓ /health respondeu 200"; exit 0; }
            echo "tentativa $i: HTTP $CODE"; sleep 6
          done
          echo "✗ /health não respondeu 200"; exit 1
